name: Expo iOS Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (stg, prd)'
        required: true
        type: string
      node-version:
        required: true
        type: string
      yarn-version:
        required: false
        type: string
        default: '4.9.2'
      cocoapods-version:
        required: false
        type: string
        default: '1.16.2'
      macos-runner-image:
        required: false
        type: string
        default: 'macos-15'
      xcode-version:
        required: false
        type: string
        default: '26.0'
        description: 'Expo SDK 55 requires Xcode >= 26.0'

jobs:
  deploy:
    runs-on: ${{ inputs.macos-runner-image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Yarn
        run: |
          corepack prepare yarn@${{ inputs.yarn-version }} --activate
          yarn --version

      - name: Install dependencies
        run: yarn install --immutable

      - name: Free-up Space
        run: |
          df -h
          {
            xcrun simctl delete all
            sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
            sudo rm -rf ~/Library/Developer/CoreSimulator/Devices/*
          } || {
            echo "Cleaning devices and cache failed. Continuing the execution"
          }
          {
            sudo rm -rf ~/Library/Developer/Xcode/DerivedData
            sudo rm -rf /Applications/Xcode_{14.3.1,15.0.1,15.1}.app
          } || {
            echo "Cleaning unused xcode version failed. Continuing the execution"
          }
          df -h

      - name: Xcode Select Version
        uses: mobiledevops/xcode-select-version-action@v1
        with:
          xcode-select-version: ${{ inputs.xcode-version }}

      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Install Fastlane
        run: gem install fastlane

      - name: Install Specific xcodeproj Gem Version
        run: |
          sudo gem uninstall xcodeproj -x --ignore-dependencies || true
          sudo gem install xcodeproj -v 1.25.1

      - name: Setup cocoapods
        run: gem install cocoapods -v ${{ inputs.cocoapods-version }}

      - name: Install Doppler CLI
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sudo sh
          doppler --version

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install iOS platform
        run: sudo xcodebuild -downloadPlatform iOS

      - name: Build and Deploy to Apple App Store
        run: yarn deploy-store-ios
        env:
          ENV: ${{ inputs.environment }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Required for non-interactive Apple auth in CI.
          # Generate an app-specific password at appleid.apple.com.
          EXPO_APPLE_ID: ${{ secrets.EXPO_APPLE_ID }}
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.EXPO_APPLE_APP_SPECIFIC_PASSWORD }}
